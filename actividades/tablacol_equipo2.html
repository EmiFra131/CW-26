<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name = "author" content="Emilio Fraide, Citlalli Chavez, Axel Montes, Sofia Bonilla, Jorge Trejo">
    <meta name="description" content="Pagina que muestra en una tabla los colores favoritos de los integrantes de el equipo 2">
    <title>Tabla de colores</title>
    <link rel="stylesheet" href="css/tablacol.css">
</head>
<body>
    <table>
        <caption> Nuestros colores favoritos </caption>
        <thead>
            <tr>
                <th scope="col"> Integrante </th>
                <th scope="col">Color</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> CITLALLI </td>
                <td id="citlalli" class="color-favorito">rosa</td>
            </tr>
            <tr>
                <td> AXEL </td>
                <td id="axel" class="color-favorito">azul</td>
            </tr>
            <tr>
                <td> SOFIA </td>
                <td id="sofia" class="color-favorito">negro</td>
            </tr>
            <tr>
                <td> JORGE </td>
                <td id="jorge" class="color-favorito">rojo</td>
            </tr>
            <tr>
                <td> EMILIO </td>
                <td id="emilio" class="color-favorito">verde</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
